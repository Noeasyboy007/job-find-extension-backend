<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; color: #111;">
    <div style="max-width: 600px; margin: 0 auto;">
      <h2 style="margin-bottom: 6px;">Verify your email</h2>
      <p style="margin-top: 0;">
        Hi {{firstName}}, please verify your email address to activate your account.
      </p>

      <div style="margin: 24px 0;">
        <a
          href="{{verificationLink}}"
          style="background: #2563eb; color: #fff; padding: 12px 18px; text-decoration: none; border-radius: 6px; display: inline-block;"
        >
          Verify Email
        </a>
      </div>

      <p style="font-size: 13px; color: #444;">
        If you didn't request this, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
